name: 03 - WorkFlow Runners
on: push
jobs:
  ubuntu-echo:

    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: |
            echo "I am running on an ubuntu runner"
            echo "Runner OS: $RUNNER_OS"

windows-echo:
   runs-on: windows-latest
   steps:
    - name: Show OS
      run: |
            echo "I am running on an windows runner"
            echo "Runner OS: $RUNNER_OS"
    
